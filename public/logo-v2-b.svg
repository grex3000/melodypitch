<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Light emerald gradient background -->
  <defs>
    <linearGradient id="emeraldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#emeraldLight)"/>
  
  <!-- Concentric rings -->
  <circle cx="256" cy="256" r="180" stroke="#059669" stroke-width="3" fill="none" opacity="0.3"/>
  <circle cx="256" cy="256" r="135" stroke="#059669" stroke-width="3" fill="none" opacity="0.5"/>
  <circle cx="256" cy="256" r="90" stroke="#059669" stroke-width="3" fill="none" opacity="0.7"/>
  
  <!-- Sound wave arc -->
  <path d="M170 256 Q256 128, 342 256" 
        stroke="#059669" 
        stroke-width="14" 
        stroke-linecap="round" 
        fill="none"/>
  
  <!-- Musical note -->
  <rect x="290" y="190" width="24" height="56" rx="6" fill="#059669"/>
  <rect x="314" y="182" width="18" height="32" rx="4" fill="#059669"/>
  <path d="M314 214 Q350 195, 350 230 Q350 260, 314 242" fill="#059669" opacity="0.85"/>
  
  <!-- Accent dot -->
  <circle cx="130" cy="320" r="14" fill="#10b981"/>
</svg>