<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27272a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="20" y="20" width="160" height="160" rx="32" fill="url(#gradDark)"/>
  
  <!-- Stylized M for Melody -->
  <path d="M50 140 L50 70 L80 100 L110 60 L110 140" 
        fill="none" 
        stroke="#10b981" 
        stroke-width="10" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Pitch wave -->
  <path d="M125 80 Q140 60, 155 80 T175 60" 
        fill="none" 
        stroke="white" 
        stroke-width="4" 
        stroke-linecap="round"
        opacity="0.9"/>
        
  <!-- Small musical note -->
  <circle cx="145" cy="110" r="6" fill="#10b981"/>
  <rect x="150" y="95" width="3" height="18" fill="#10b981" rx="1"/>
  <rect x="153" y="95" width="8" height="3" fill="#10b981" rx="1"/>
</svg>