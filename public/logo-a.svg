<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  
  <!-- Background: Rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#g1)"/>
  
  <!-- Stylized "M" made of sound waves -->
  <path d="M80 380 L80 180 Q80 120, 140 160 L180 200 Q200 220, 220 160 L260 100 Q280 60, 320 120 L360 180 L360 380" 
        fill="none" 
        stroke="#10b981" 
        stroke-width="32" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
        
  <!-- Pitch arrow -->
  <path d="M400 140 L440 100 M440 100 L400 100 M440 100 L440 140" 
        fill="none" 
        stroke="#34d399" 
        stroke-width="24" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
        
  <!-- Musical notes floating -->
  <circle cx="320" cy="320" r="16" fill="#10b981"/>
  <rect x="340" y="270" width="12" height="60" fill="#10b981" rx="4"/>
  <rect x="350" y="270" width="28" height="12" fill="#10b981" rx="4"/>
  
  <circle cx="120" cy="280" r="12" fill="#34d399" opacity="0.7"/>
  <rect x="136" y="250" width="10" height="36" fill="#34d399" opacity="0.7" rx="3"/>
  <rect x="144" y="250" width="20" height="10" fill="#34d399" opacity="0.7" rx="3"/>
</svg>