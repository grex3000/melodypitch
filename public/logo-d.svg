<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: Soft dark -->
  <rect width="512" height="512" fill="#0f172a"/>
  
  <!-- Starburst / sound emanating -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#10b981" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#10b981" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#10b981" stroke-width="3" opacity="0.5"/>
  
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="60" fill="#10b981" opacity="0.15"/>
  
  <!-- Sound wave emanating from center -->
  <path d="M180 256 Q220 180, 256 180 Q292 180, 332 256" 
        fill="none" 
        stroke="white" 
        stroke-width="20" 
        stroke-linecap="round"/>
        
  <!-- Musical note in center -->
  <rect x="236" y="220" width="40" height="80" rx="8" fill="white"/>
  <rect x="276" y="220" width="16" height="36" rx="4" fill="white"/>
  <path d="M276 256 Q310 240, 310 280 Q310 320, 276 300 L276 256" fill="white" opacity="0.8"/>
  
  <!-- Small pitch arrow -->
  <path d="M380 180 L420 140 M420 140 L420 180 M420 140 L460 140" 
        fill="none" 
        stroke="#34d399" 
        stroke-width="16" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>